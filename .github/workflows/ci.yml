name: CI

on:
  push:
    branches: [master]
  pull_request:
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  test:
    name: test / linux-self-hosted / elixir-${{ matrix.elixir }} / otp-${{ matrix.otp }}
    runs-on: [self-hosted, linux, x64, exlancedb-linux]
    timeout-minutes: 60
    strategy:
      fail-fast: false
      matrix:
        include:
          - elixir: "1.19.0"
            otp: "26.2"
          - elixir: "1.19.5"
            otp: "27.3"

    env:
      MIX_ENV: test
      EX_LANCEDB_BUILD: "1"
      ImageOS: ubuntu24

    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Set up Elixir + OTP
        uses: erlef/setup-beam@3580539ceec3dc05b0ed51e9e10b08eb7a7c2bb4 # v1.21.0
        with:
          elixir-version: ${{ matrix.elixir }}
          otp-version: ${{ matrix.otp }}

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@e97e2d8cc328f1b50210efc529dca0028893a2d9 # v1
        with:
          toolchain: stable

      - name: Verify protobuf compiler
        run: protoc --version

      - name: Cache Mix dependencies and build
        uses: actions/cache@668228422ae6a00e4ad889ee87cd7109ec5666a7 # v5.0.4
        with:
          path: |
            deps
            _build
          key: mix-${{ runner.os }}-${{ matrix.elixir }}-${{ matrix.otp }}-${{ hashFiles('mix.lock') }}
          restore-keys: |
            mix-${{ runner.os }}-${{ matrix.elixir }}-${{ matrix.otp }}-
            mix-${{ runner.os }}-

      - name: Cache Rust artifacts
        uses: Swatinem/rust-cache@779680da715d629ac1d338a641029a2f4372abb5 # v2
        with:
          workspaces: |
            native/ex_lancedb_nif

      - name: Install deps
        run: mix deps.get

      - name: Compile with warnings as errors
        run: mix compile --warnings-as-errors

      - name: Run tests
        run: mix test

  quality:
    name: quality gates
    runs-on: [self-hosted, linux, x64, exlancedb-linux]
    timeout-minutes: 60
    env:
      MIX_ENV: dev
      EX_LANCEDB_BUILD: "1"
      ImageOS: ubuntu24
    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Set up Elixir + OTP
        uses: erlef/setup-beam@3580539ceec3dc05b0ed51e9e10b08eb7a7c2bb4 # v1.21.0
        with:
          elixir-version: "1.19.5"
          otp-version: "27.3"

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@e97e2d8cc328f1b50210efc529dca0028893a2d9 # v1
        with:
          toolchain: stable

      - name: Verify protobuf compiler
        run: protoc --version

      - name: Cache Mix dependencies and build
        uses: actions/cache@668228422ae6a00e4ad889ee87cd7109ec5666a7 # v5.0.4
        with:
          path: |
            deps
            _build
          key: quality-mix-${{ runner.os }}-${{ hashFiles('mix.lock') }}
          restore-keys: |
            quality-mix-${{ runner.os }}-

      - name: Cache Rust artifacts
        uses: Swatinem/rust-cache@779680da715d629ac1d338a641029a2f4372abb5 # v2
        with:
          workspaces: |
            native/ex_lancedb_nif

      - name: Install deps
        run: mix deps.get

      - name: Format check
        run: mix format --check-formatted

      - name: Dependency hygiene
        run: mix deps.unlock --check-unused

      - name: Compile with warnings as errors
        run: mix compile --warnings-as-errors

      - name: Credo strict
        run: mix credo --strict

      - name: Build docs
        run: mix docs

      - name: Dependency audit
        run: mix deps.audit

  typecheck:
    name: dialyzer
    runs-on: [self-hosted, linux, x64, exlancedb-linux]
    timeout-minutes: 75
    env:
      MIX_ENV: dev
      EX_LANCEDB_BUILD: "1"
      ImageOS: ubuntu24
    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Set up Elixir + OTP
        uses: erlef/setup-beam@3580539ceec3dc05b0ed51e9e10b08eb7a7c2bb4 # v1.21.0
        with:
          elixir-version: "1.19.5"
          otp-version: "27.3"

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@e97e2d8cc328f1b50210efc529dca0028893a2d9 # v1
        with:
          toolchain: stable

      - name: Verify protobuf compiler
        run: protoc --version

      - name: Cache Mix dependencies and build
        uses: actions/cache@668228422ae6a00e4ad889ee87cd7109ec5666a7 # v5.0.4
        with:
          path: |
            deps
            _build
            priv/plts
          key: dialyzer-mix-${{ runner.os }}-${{ hashFiles('mix.lock') }}
          restore-keys: |
            dialyzer-mix-${{ runner.os }}-

      - name: Cache Rust artifacts
        uses: Swatinem/rust-cache@779680da715d629ac1d338a641029a2f4372abb5 # v2
        with:
          workspaces: |
            native/ex_lancedb_nif

      - name: Install deps
        run: mix deps.get

      - name: Compile
        run: mix compile

      - name: Dialyzer
        run: mix dialyzer --format short
