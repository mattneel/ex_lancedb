name: CI

on:
  push:
    branches: [master]
  pull_request:
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  test:
    name: test / ${{ matrix.os }} / elixir-${{ matrix.elixir }} / otp-${{ matrix.otp }}
    runs-on: ${{ matrix.os }}
    timeout-minutes: 60
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-24.04
            elixir: "1.19.0"
            otp: "26.2"
          - os: ubuntu-24.04
            elixir: "1.19.5"
            otp: "27.3"
          - os: macos-latest
            elixir: "1.19.5"
            otp: "27.3"

    env:
      MIX_ENV: test
      EX_LANCEDB_BUILD: "1"

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Elixir + OTP
        uses: erlef/setup-beam@v1
        with:
          elixir-version: ${{ matrix.elixir }}
          otp-version: ${{ matrix.otp }}

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Install protobuf compiler (Linux)
        if: startsWith(matrix.os, 'ubuntu-')
        run: sudo apt-get update && sudo apt-get install -y protobuf-compiler

      - name: Install protobuf compiler (macOS)
        if: startsWith(matrix.os, 'macos-')
        run: brew install protobuf

      - name: Cache Mix dependencies and build
        uses: actions/cache@v4
        with:
          path: |
            deps
            _build
          key: mix-${{ runner.os }}-${{ matrix.elixir }}-${{ matrix.otp }}-${{ hashFiles('mix.lock') }}
          restore-keys: |
            mix-${{ runner.os }}-${{ matrix.elixir }}-${{ matrix.otp }}-
            mix-${{ runner.os }}-

      - name: Cache Rust artifacts
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: |
            native/ex_lancedb_nif

      - name: Install deps
        run: mix deps.get

      - name: Compile with warnings as errors
        run: mix compile --warnings-as-errors

      - name: Run tests
        run: mix test

  quality:
    name: quality gates
    runs-on: ubuntu-24.04
    timeout-minutes: 60
    env:
      MIX_ENV: dev
      EX_LANCEDB_BUILD: "1"
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Elixir + OTP
        uses: erlef/setup-beam@v1
        with:
          elixir-version: "1.19.5"
          otp-version: "27.3"

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Install protobuf compiler
        run: sudo apt-get update && sudo apt-get install -y protobuf-compiler

      - name: Cache Mix dependencies and build
        uses: actions/cache@v4
        with:
          path: |
            deps
            _build
          key: quality-mix-${{ runner.os }}-${{ hashFiles('mix.lock') }}
          restore-keys: |
            quality-mix-${{ runner.os }}-

      - name: Cache Rust artifacts
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: |
            native/ex_lancedb_nif

      - name: Install deps
        run: mix deps.get

      - name: Format check
        run: mix format --check-formatted

      - name: Dependency hygiene
        run: mix deps.unlock --check-unused

      - name: Compile with warnings as errors
        run: mix compile --warnings-as-errors

      - name: Credo strict
        run: mix credo --strict

      - name: Build docs
        run: mix docs

      - name: Dependency audit
        run: mix deps.audit

  typecheck:
    name: dialyzer
    runs-on: ubuntu-24.04
    timeout-minutes: 75
    env:
      MIX_ENV: dev
      EX_LANCEDB_BUILD: "1"
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Elixir + OTP
        uses: erlef/setup-beam@v1
        with:
          elixir-version: "1.19.5"
          otp-version: "27.3"

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Install protobuf compiler
        run: sudo apt-get update && sudo apt-get install -y protobuf-compiler

      - name: Cache Mix dependencies and build
        uses: actions/cache@v4
        with:
          path: |
            deps
            _build
            priv/plts
          key: dialyzer-mix-${{ runner.os }}-${{ hashFiles('mix.lock') }}
          restore-keys: |
            dialyzer-mix-${{ runner.os }}-

      - name: Cache Rust artifacts
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: |
            native/ex_lancedb_nif

      - name: Install deps
        run: mix deps.get

      - name: Compile
        run: mix compile

      - name: Dialyzer
        run: mix dialyzer --format short
