name: Bug report
description: Report a reproducible defect in ex_lancedb
title: "bug: "
labels: ["bug", "needs-triage"]
body:
  - type: markdown
    attributes:
      value: |
        Please include a minimal reproduction and exact version details.
  - type: textarea
    id: summary
    attributes:
      label: Summary
      description: What failed and what did you expect?
      placeholder: A concise bug summary
    validations:
      required: true
  - type: textarea
    id: reproduction
    attributes:
      label: Reproduction Steps
      description: Include code snippets, commands, and any fixture data needed.
      placeholder: |
        1. ...
        2. ...
        3. ...
    validations:
      required: true
  - type: textarea
    id: actual
    attributes:
      label: Actual Behavior
    validations:
      required: true
  - type: textarea
    id: expected
    attributes:
      label: Expected Behavior
    validations:
      required: true
  - type: input
    id: elixir
    attributes:
      label: Elixir version
      placeholder: "1.19.5"
    validations:
      required: true
  - type: input
    id: otp
    attributes:
      label: OTP version
      placeholder: "27.3"
    validations:
      required: true
  - type: input
    id: ex_lancedb
    attributes:
      label: ex_lancedb version
      placeholder: "0.1.0"
    validations:
      required: true
  - type: input
    id: os
    attributes:
      label: OS and architecture
      placeholder: "ubuntu-24.04 x86_64"
    validations:
      required: true
  - type: textarea
    id: logs
    attributes:
      label: Logs and stack traces
      render: text
